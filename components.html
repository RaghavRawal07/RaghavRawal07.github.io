   <link rel="preload" href="https://try.abtasty.com/81677aa3dd7b49d4a23ac9870dfee7ce.js" as="script">
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elements SPA — Normal, Shadow DOM &amp; IFrame</title>
  <style>
    :root {
      --bg: #0f172a;
      --card: #1e293b;
      --card-2: #263449;
      --accent: #6366f1;
      --accent-2: #22d3ee;
      --text: #e2e8f0;
      --muted: #94a3b8;
      --border: #334155;
      --ok: #22c55e;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(1200px 600px at 10% -10%, #1e293b 0%, var(--bg) 55%);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 20px 80px;
    }

    /* ---------- SPA top navigation (persistent shell) ---------- */
    .topnav {
      max-width: 960px;
      margin: 0 auto 26px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 18px;
    }
    .topnav .brand { font-weight: 700; letter-spacing: 0.02em; }
    .navlinks { display: flex; gap: 10px; }
    .navlinks a {
      text-decoration: none;
      color: var(--muted);
      font-weight: 600;
      font-size: 0.9rem;
      padding: 8px 14px;
      border-radius: 10px;
      border: 1px solid transparent;
      transition: all 0.15s ease;
    }
    .navlinks a:hover { color: var(--text); background: rgba(99, 102, 241, 0.12); }
    .navlinks a.active {
      color: white;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
    }

    header {
      max-width: 960px;
      margin: 0 auto 32px;
      text-align: center;
    }

    header h1 {
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      margin: 0 0 10px;
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }

    header p { color: var(--muted); margin: 0; font-size: 1.05rem; }

    /* In-page link to the other page */
    .page-link {
      display: inline-block;
      margin-top: 14px;
      color: var(--accent-2);
      text-decoration: none;
      font-weight: 600;
      padding: 8px 16px;
      border: 1px solid var(--accent-2);
      border-radius: 999px;
      transition: all 0.15s ease;
    }
    .page-link:hover { background: rgba(34, 211, 238, 0.12); }

    .grid {
      max-width: 960px;
      margin: 0 auto;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 22px;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 22px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.25);
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .tag {
      align-self: flex-start;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent-2);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 4px 12px;
    }

    .card h2 { margin: 0; font-size: 1.25rem; }
    .card p { margin: 0; color: var(--muted); font-size: 0.94rem; line-height: 1.5; }

    button {
      cursor: pointer;
      border: none;
      border-radius: 10px;
      padding: 11px 18px;
      font-size: 0.95rem;
      font-weight: 600;
      color: white;
      background: linear-gradient(135deg, var(--accent), #4f46e5);
      transition: transform 0.06s ease, filter 0.15s ease;
      align-self: flex-start;
    }
    button:hover { filter: brightness(1.1); }
    button:active { transform: translateY(1px); }

    .list-actions { display: flex; flex-wrap: wrap; gap: 10px; }

    iframe {
      width: 100%;
      height: 190px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #0b1220;
    }

    /* Live log / status area */
    .status {
      max-width: 960px;
      margin: 30px auto 0;
      background: var(--card-2);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 18px 20px;
    }
    .status h3 { margin: 0 0 10px; font-size: 1rem; color: var(--muted); }
    #log {
      margin: 0;
      font-family: ui-monospace, "SF Mono", Menlo, monospace;
      font-size: 0.85rem;
      color: var(--text);
      max-height: 160px;
      overflow: auto;
      white-space: pre-wrap;
    }
    #log .entry { padding: 2px 0; border-bottom: 1px dashed var(--border); }
    #log .entry:last-child { border-bottom: none; }
    #log .src { color: var(--accent-2); font-weight: 700; }

    /* View transition */
    .view { animation: fadeIn 0.25s ease; }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
  </style>
</head>
<body>
  <!-- Persistent SPA shell: nav links are available on every page -->
  <nav class="topnav">
    <span class="brand">Elements SPA</span>
    <div class="navlinks">
      <a href="#/page1" data-route="/page1">Page 1</a>
      <a href="#/page2" data-route="/page2">Page 2</a>
    </div>
  </nav>

  <!-- The router renders the active page into this container -->
  <div id="app"></div>

  <script>
    const app = document.getElementById('app');

    // ---------- Shared SPA state (persists across route changes) ----------
    const state = {
      count: 0,
      logEntries: [],
    };

    // ---------- Shared logger ----------
    function log(source, message) {
      state.logEntries.unshift({ source, message, time: new Date().toLocaleTimeString() });
      renderLog();
    }

    function renderLog() {
      const logEl = document.getElementById('log');
      if (!logEl) return; // #log only exists once a page is mounted
      logEl.innerHTML = state.logEntries.map((e) =>
        `<div class="entry"><span class="src">[${e.source}]</span> ${e.message} ` +
        `<span style="color:var(--muted)">— ${e.time}</span></div>`
      ).join('');
    }

    // ---------- Page content template (identical for both pages) ----------
    function viewHTML(pageNum) {
      const other = pageNum === 1 ? 2 : 1;
      return `
        <div class="view">
          <header>
            <h1>Elements Demo — Page ${pageNum}</h1>
            <p>Normal DOM elements, a Shadow DOM element, and an IFrame — each with its own button.</p>
            <a class="page-link" href="#/page${other}">Go to Page ${other} &rarr;</a>
          </header>

          <main class="grid">
            <!-- ============ NORMAL ELEMENTS ============ -->
            <section class="card">
              <span class="tag">Normal element</span>
              <h2>Plain Card</h2>
              <p>A regular element that lives directly in the main document DOM.</p>
              <button id="normalBtn">Click me (Normal)</button>
            </section>

            <section class="card">
              <span class="tag">Normal element</span>
              <h2>Counter Card</h2>
              <p>Another normal element. Its button increments a counter.</p>
              <p>Count: <strong id="countValue">0</strong></p>
              <button id="counterBtn">Increment (Normal)</button>
            </section>

            <article class="card">
              <span class="tag">Normal element</span>
              <h2>Actions Card</h2>
              <p>Multiple buttons inside one normal element.</p>
              <div class="list-actions">
                <button data-action="say-hi">Say Hi</button>
                <button data-action="say-bye">Say Bye</button>
              </div>
            </article>

            <!-- ============ SHADOW DOM ELEMENT ============ -->
            <section class="card">
              <span class="tag">Shadow DOM</span>
              <h2>Shadow Host</h2>
              <p>The button below lives inside an encapsulated shadow root (custom element).</p>
              <shadow-widget></shadow-widget>
            </section>

            <!-- ============ IFRAME ELEMENT ============ -->
            <section class="card">
              <span class="tag">IFrame</span>
              <h2>Embedded Frame</h2>
              <p>A separate document embedded via &lt;iframe&gt;. Its button lives inside the frame.</p>
              <iframe id="demoFrame" title="Embedded frame with a button"></iframe>
            </section>
          </main>

          <div class="status">
            <h3>Live log (shared across pages)</h3>
            <div id="log"></div>
          </div>
        </div>
      `;
    }

    // ---------- IFrame document (built once, injected on each render) ----------
    const frameDoc = `
      <!DOCTYPE html>
      <html>
      <head>
        <meta charset="UTF-8" />
        <style>
          body {
            margin: 0;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-family: system-ui, sans-serif;
            background: #0b1220;
            color: #e2e8f0;
          }
          p { margin: 0; font-size: 0.9rem; color: #94a3b8; }
          button {
            cursor: pointer;
            border: none;
            border-radius: 10px;
            padding: 10px 16px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #f59e0b, #f97316);
          }
          .out { font-size: 0.85rem; color: #22c55e; min-height: 1em; }
        </style>
      </head>
      <body>
        <p>This is a separate document inside an iframe.</p>
        <button id="frameBtn">Click me (IFrame)</button>
        <div class="out" id="frameOut"></div>
        <script>
          let n = 0;
          document.getElementById('frameBtn').addEventListener('click', function () {
            n += 1;
            document.getElementById('frameOut').textContent = 'Clicked ' + n + ' time(s) inside iframe.';
            parent.postMessage({ source: 'IFrame', message: 'Frame button clicked (' + n + ').' }, '*');
          });
        <\/script>
      </body>
      </html>
    `;

    // ---------- Render a page and wire up its buttons ----------
    function renderPage(pageNum) {
      app.innerHTML = viewHTML(pageNum);

      // Normal elements
      app.querySelector('#normalBtn').addEventListener('click', () => {
        log('Normal', `Plain card button clicked (Page ${pageNum}).`);
      });

      const countValue = app.querySelector('#countValue');
      countValue.textContent = state.count;
      app.querySelector('#counterBtn').addEventListener('click', () => {
        state.count += 1;
        countValue.textContent = state.count;
        log('Normal', `Counter incremented to ${state.count}.`);
      });

      app.querySelectorAll('[data-action]').forEach((btn) => {
        btn.addEventListener('click', () => {
          const action = btn.getAttribute('data-action');
          log('Normal', action === 'say-hi' ? 'Hi there! 👋' : 'Goodbye! 👋');
        });
      });

      // IFrame element (shadow-widget upgrades itself automatically)
      app.querySelector('#demoFrame').srcdoc = frameDoc;

      renderLog();
    }

    // ---------- Shadow DOM custom element (defined once) ----------
    class ShadowWidget extends HTMLElement {
      constructor() {
        super();
        const root = this.attachShadow({ mode: 'open' });
        root.innerHTML = `
          <style>
            .box {
              border: 1px dashed #22d3ee;
              border-radius: 10px;
              padding: 14px;
              text-align: center;
              background: rgba(34, 211, 238, 0.06);
            }
            p { margin: 0 0 10px; color: #cbd5e1; font-size: 0.9rem; }
            button {
              cursor: pointer;
              border: none;
              border-radius: 10px;
              padding: 10px 16px;
              font-weight: 600;
              color: #0f172a;
              background: linear-gradient(135deg, #22d3ee, #06b6d4);
            }
            .out { margin-top: 10px; font-size: 0.85rem; color: #22c55e; min-height: 1em; }
          </style>
          <div class="box">
            <p>This content is inside a shadow root.</p>
            <button id="shadowBtn">Click me (Shadow DOM)</button>
            <div class="out" id="shadowOut"></div>
          </div>
        `;

        const btn = root.getElementById('shadowBtn');
        const out = root.getElementById('shadowOut');
        let clicks = 0;
        btn.addEventListener('click', () => {
          clicks += 1;
          out.textContent = `Clicked ${clicks} time(s) inside Shadow DOM.`;
          log('Shadow DOM', `Encapsulated button clicked (${clicks}).`);
        });
      }
    }
    customElements.define('shadow-widget', ShadowWidget);

    // ---------- Hash-based SPA router ----------
    function router() {
      const path = location.hash.replace(/^#/, '') || '/page1';
      const pageNum = path === '/page2' ? 2 : 1;
      renderPage(pageNum);
      log('router', `Navigated to Page ${pageNum} (no full reload).`);

      // Highlight the active nav link
      document.querySelectorAll('.navlinks a').forEach((a) => {
        a.classList.toggle('active', a.getAttribute('data-route') === `/page${pageNum}`);
      });
    }

    // Receive messages from the iframe and log them in the parent
    window.addEventListener('message', (event) => {
      const data = event.data || {};
      if (data.source === 'IFrame') log('IFrame', data.message);
    });

    window.addEventListener('hashchange', router);

    log('system', 'SPA loaded. Use the top nav or in-page links to switch pages.');
    router();
  </script>
</body>
</html>
